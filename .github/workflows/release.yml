name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          SIGNING_KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Rename APKs
        run: |
          APP_ID="com.frodrigues.odbmqtt"
          VERSION="${GITHUB_REF_NAME#v}"
          mv app/build/outputs/apk/debug/*.apk   "app/build/outputs/apk/debug/${APP_ID}-${VERSION}-debug.apk"
          mv app/build/outputs/apk/release/*.apk "app/build/outputs/apk/release/${APP_ID}-${VERSION}-release.apk"

      - name: Generate release notes from commits
        id: release_notes
        run: |
          # Get tag name
          TAG="${GITHUB_REF#refs/tags/}"

          # Get previous tag (if any)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges)
          fi

          # Write to file to handle multiline
          echo "$NOTES" > release_notes.txt
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_notes.outputs.tag }}
          name: Release ${{ steps.release_notes.outputs.tag }}
          body_path: release_notes.txt
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
